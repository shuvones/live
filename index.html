    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; text-align: center; background-color: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .main-wrapper { max-width: 100%; margin: 0 auto; padding-top: 5px; }
        
        /* Video Container for Mobile First */
        .video-container { 
            position: relative; width: 100%; max-width: 800px;

            border-bottom: 1px solid #222; overflow: hidden;

        }
        video { width: 100%; display: block; cursor: pointer; aspect-ratio: 16 / 9; object-fit: contain; }
        
        /* High Conversion Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        #continue-btn {
            padding: 18px 40px; font-size: 22px; font-weight: bold;
            color: #fff; background: linear-gradient(180deg, #ff0000 0%, #b30000 100%);
            border: none; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.5);
            text-transform: uppercase; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .overlay-text { margin-bottom: 20px; font-size: 18px; color: #fff; text-shadow: 1px 1px 2px #000; }

        /* Ad Sections */
        .ad-box { margin: 10px auto; min-height: 95px; width: 100%; display: flex; justify-content: center; }
        .banner-mid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
        
        /* Mobile Ad Tweak */
        @media (max-width: 600px) {
            .overlay-text { font-size: 16px; }

</head>

<script>
    const video = document.getElementById('adVideo');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    
    // Pause Points (seconds)
    let points = [8, 25]; 
    let currentStep = 0;

    // YOUR NEW SMARTLINKS
    const smartlinks = [
        "https://www.facebook.com", // 1st Link
        "https://google-2fo.pages.dev" // 2nd Link
    ];

    video.addEventListener('timeupdate', function() {
        if (currentStep < points.length && Math.floor(video.currentTime) >= points[currentStep]) {
            video.pause();
            if(currentStep === 1) {
                statusText.innerText = "❌ Verification Required to Unmute & Continue";
            }
            overlay.style.display = 'flex';
            if (document.exitFullscreen) { document.exitFullscreen().catch(() => {}); }
        }
    });

    function processClick() {
        if (currentStep === 0) {
            // Mobile Optimization: Open 1st link in new tab
            window.open(smartlinks[currentStep], '_blank');
            overlay.style.display = 'none';
            video.muted = false; // Unmute for user engagement
            currentStep++;
            video.play();
        } else {
            // High Conversion: Redirect same tab for 2nd link
            window.location.href = smartlinks[currentStep];
        }
    }
</script>
