<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Cam 💋</title>
    
    <script type="text/javascript" src="https://pl19470440.effectivegatecpm.com/6a/fc/d7/6afcd75ee124dca8a33e537556449f39.js"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #000; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .main-wrapper { max-width: 100%; margin: 0 auto; padding-top: 5px; }
        
        .video-container { 
            position: relative; width: 100%; max-width: 800px; 
            margin: 10px auto; background: #000; overflow: hidden;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4); border-radius: 8px;
        }
        video { width: 100%; display: block; aspect-ratio: 16 / 9; cursor: pointer; }
        
        /* পজ ওভারলে */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        
        /* বাটন টেক্সট আপডেট */
        #continue-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            color: #fff; background: linear-gradient(180deg, #ff0000 0%, #b30000 100%);
            border: none; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            text-transform: uppercase; animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .overlay-text { margin-bottom: 20px; font-size: 18px; color: #ffcc00; font-weight: bold; }
        
        /* হেডফোন টেক্সট স্টাইল */
        .audio-hint { font-size: 14px; color: #8b949e; margin-top: 10px; font-style: italic; }

        .ad-box { margin: 10px auto; min-height: 90px; display: flex; justify-content: center; }
        .banner-mid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="ad-box">
        <script type="text/javascript">
            atOptions = { 'key' : '401112f18e92536fc7dbfde0a70179b5', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/401112f18e92536fc7dbfde0a70179b5/invoke.js"></script>
    </div>

    <div class="video-container">
        <video id="adVideo" autoplay muted playsinline>
            <source src="https://dl.dropboxusercontent.com/scl/fi/rjy1y18lsdgkgrfhjfuyw/vdeo.mp4?rlkey=7k48vclg5qyld0uooyc7cpvqj&st=58pksm3s&raw=1" type="video/mp4">
        </video>

        <div id="overlay">
            <div id="status-text" class="overlay-text">⚠️ Tap to Verify and Unmute</div>
            <button id="continue-btn" onclick="processClick()">UNMUTE & WATCH NOW</button>
        </div>
    </div>

    <p class="audio-hint">Connect headphones for better sound 🎧</p>

    <div class="banner-mid">
        <div style="width: 300px; height: 250px; background: #111;">
            <script type="text/javascript">
                atOptions = { 'key' : '18468a5c9ec6841cb9bcb2d642669b71', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/18468a5c9ec6841cb9bcb2d642669b71/invoke.js"></script>
        </div>
        <div style="width: 300px; min-height: 250px;">
            <script async="async" data-cfasync="false" src="https://pl19470442.effectivegatecpm.com/b5157fe610530858719866453ae9c66e/invoke.js"></script>
            <div id="container-b5157fe610530858719866453ae9c66e"></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('adVideo');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    
    let currentStep = 0;
    const points = [8, 25]; 
    const smartlinks = [
        "https://www.effectivegatecpm.com/ed82fc3w4?key=0dbc71cd4988eb7ccf18a9067c96e6a1", 
        "https://google-2fo.pages.dev" 
    ];

    // ভিডিও পজ করার জন্য মনিটর
    const checkTime = setInterval(function() {
        let pauseTime = (currentStep === 0) ? points[0] : points[1];
        if (video.currentTime >= pauseTime) {
            video.pause();
            overlay.style.display = 'flex';
        }
    }, 500);

    function processClick() {
        if (currentStep === 0) {
            window.open(smartlinks[0], '_blank');
            overlay.style.display = 'none';
            video.muted = false; 
            currentStep = 1;
            video.play();
            statusText.innerText = "❌ Verification Required to Continue";
        } else {
            clearInterval(checkTime);
            window.location.href = smartlinks[1];
        }
    }

    // অটো-প্লে চেক
    window.onload = function() {
        video.play().catch(function() {
            overlay.style.display = 'flex';
            statusText.innerText = "Click to Start Video";
        });
    };
</script>

</body>
</html>
